<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Rental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div x-data="catalogComponent" class="flex flex-col min-h-screen">
      <!-- ── Navbar ──────────────────────────────────────────────────────────── -->
      <header
        class="sticky top-0 z-30 border-b border-zinc-800 bg-zinc-950/80 backdrop-blur-md"
      >
        <div
          class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between gap-4"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-8 h-8 rounded-lg bg-zinc-800 border border-zinc-700 flex items-center justify-center"
            >
              <svg
                class="w-4 h-4 text-zinc-300"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12"
                />
              </svg>
            </div>
            <span class="font-semibold tracking-tight">Rental</span>
            <span class="hidden sm:inline text-zinc-600 text-sm">/ Fleet</span>
          </div>
          <div class="flex items-center gap-3">
            <span
              class="hidden sm:inline-flex items-center gap-1.5 text-xs font-medium text-zinc-400 bg-zinc-800/70 border border-zinc-700 rounded-full px-3 py-1 capitalize"
            >
              <span class="w-1.5 h-1.5 rounded-full bg-zinc-400"></span>
              <span x-text="$store.auth.role ?? 'customer'"></span>
            </span>
            <button
              @click="$store.auth.logout()"
              class="flex items-center gap-1.5 text-sm font-medium text-zinc-400 hover:text-zinc-100 border border-zinc-800 hover:border-zinc-600 rounded-lg px-3.5 py-1.5 transition"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"
                />
              </svg>
              Logout
            </button>
          </div>
        </div>
      </header>

      <!-- ── Page header ──────────────────────────────────────────────────────── -->
      <section class="border-b border-zinc-800/60 bg-zinc-900/30">
        <div class="max-w-7xl mx-auto px-6 py-8">
          <h2 class="text-xl font-semibold tracking-tight">Vehicle Catalog</h2>
          <p class="mt-1 text-sm text-zinc-500">
            Browse available units and book your next rental.
          </p>
        </div>
      </section>

      <!-- ── Main ────────────────────────────────────────────────────────────── -->
      <main class="flex-1 max-w-7xl mx-auto w-full px-6 py-10 space-y-16">
        <!-- ╔═ Vehicle Grid ══════════════════════════════════════════════════════ -->
        <div>
          <!-- Skeleton -->
          <template x-if="loading">
            <div
              class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"
            >
              <template x-for="i in 8">
                <div
                  class="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden animate-pulse"
                >
                  <div class="h-44 bg-zinc-800"></div>
                  <div class="p-4 space-y-3">
                    <div class="h-4 bg-zinc-800 rounded w-3/4"></div>
                    <div class="h-3 bg-zinc-800 rounded w-1/2"></div>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                      <div class="h-8 bg-zinc-800 rounded"></div>
                      <div class="h-8 bg-zinc-800 rounded"></div>
                    </div>
                    <div class="h-9 bg-zinc-800 rounded-lg"></div>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <!-- Empty -->
          <template x-if="!loading && vehicles.length === 0">
            <div class="flex flex-col items-center py-24 text-center">
              <div
                class="w-14 h-14 rounded-xl bg-zinc-800 border border-zinc-700 flex items-center justify-center mb-4"
              >
                <svg
                  class="w-7 h-7 text-zinc-500"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12"
                  />
                </svg>
              </div>
              <p class="text-zinc-400 font-medium">
                No vehicles in the catalog
              </p>
              <p class="text-zinc-600 text-sm mt-1">
                Check back later or contact an admin.
              </p>
            </div>
          </template>

          <!-- Grid -->
          <template x-if="!loading && vehicles.length > 0">
            <div
              class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"
            >
              <template x-for="v in vehicles" :key="v.id">
                <div
                  class="group bg-zinc-900 border border-zinc-800 hover:border-zinc-700 rounded-2xl overflow-hidden flex flex-col transition-all duration-200 hover:shadow-xl hover:shadow-black/50 hover:-translate-y-0.5"
                >
                  <!-- Image -->
                  <div class="relative h-44 bg-zinc-800 overflow-hidden">
                    <img
                      :src="'data:image/jpeg;base64,' + v.image_base64"
                      :alt="v.name"
                      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                      onerror="
                        this.parentElement.innerHTML =
                          '<div class=\'w-full h-full flex items-center justify-center\'><svg class=\'w-10 h-10 text-zinc-600\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'1.2\' viewBox=\'0 0 24 24\'><path stroke-linecap=\'round\' stroke-linejoin=\'round\' d=\'M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3 21h18M3.75 3h16.5M4.5 3v18m15-18v18\'/></svg></div>'
                      "
                    />
                    <!-- Status badge -->
                    <span
                      :class="v.status === 'available' ? 'bg-zinc-900/80 border-zinc-600 text-zinc-300' : 'bg-zinc-900/80 border-zinc-700 text-zinc-500'"
                      class="absolute top-3 right-3 inline-flex items-center gap-1.5 text-xs font-medium border rounded-full px-2.5 py-1 backdrop-blur-sm"
                    >
                      <span
                        :class="v.status === 'available' ? 'bg-emerald-400' : 'bg-zinc-500'"
                        class="w-1.5 h-1.5 rounded-full"
                      ></span>
                      <span x-text="statusLabel(v.status)"></span>
                    </span>
                  </div>

                  <!-- Card body -->
                  <div class="flex flex-col flex-1 p-4 gap-3">
                    <div class="flex-1">
                      <h3
                        class="font-semibold text-sm leading-snug truncate"
                        x-text="v.name"
                      ></h3>
                      <p
                        class="mt-0.5 text-xs text-zinc-500 truncate"
                        x-text="v.type ?? '—'"
                      ></p>
                      <p class="mt-2 font-bold">
                        <span x-text="price(v.price_per_day ?? v.price)"></span>
                        <span class="text-xs font-normal text-zinc-500">
                          / day</span
                        >
                      </p>
                    </div>

                    <!-- Available: date pickers + Rent Now -->
                    <template
                      x-if="v.status === 'available' && $store.auth.role === 'customer'"
                    >
                      <div class="space-y-2">
                        <div class="grid grid-cols-2 gap-2">
                          <div>
                            <label class="block text-xs text-zinc-500 mb-1"
                              >Start</label
                            >
                            <input
                              type="date"
                              x-model="v.start_date"
                              :min="new Date().toISOString().split('T')[0]"
                              class="w-full bg-zinc-950 border border-zinc-700 text-zinc-300 rounded-lg px-2.5 py-1.5 text-xs outline-none focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500 transition"
                            />
                          </div>
                          <div>
                            <label class="block text-xs text-zinc-500 mb-1"
                              >End</label
                            >
                            <input
                              type="date"
                              x-model="v.end_date"
                              :min="v.start_date || new Date().toISOString().split('T')[0]"
                              class="w-full bg-zinc-950 border border-zinc-700 text-zinc-300 rounded-lg px-2.5 py-1.5 text-xs outline-none focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500 transition"
                            />
                          </div>
                        </div>
                        <button
                          @click="rentVehicle(v)"
                          class="w-full text-sm font-semibold bg-zinc-100 hover:bg-white text-zinc-900 rounded-lg px-4 py-2 transition"
                        >
                          Rent Now
                        </button>
                      </div>
                    </template>

                    <!-- Booked -->
                    <template x-if="v.status === 'booked'">
                      <button
                        disabled
                        class="w-full text-sm font-medium bg-zinc-800 text-zinc-600 rounded-lg px-4 py-2 cursor-not-allowed"
                      >
                        Already Booked
                      </button>
                    </template>
                    <!-- Maintenance -->
                    <template x-if="v.status === 'maintenance'">
                      <button
                        disabled
                        class="w-full text-sm font-medium bg-zinc-800 text-zinc-600 rounded-lg px-4 py-2 cursor-not-allowed"
                      >
                        Under Maintenance
                      </button>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>

        <!-- ╔═ My Rental History ════════════════════════════════════════════════ -->
        <div>
          <div class="mb-6">
            <h2 class="text-lg font-semibold tracking-tight">
              My Rental History
            </h2>
            <p class="mt-1 text-sm text-zinc-500">
              Your past and current bookings retrieved from the booking service.
            </p>
          </div>

          <!-- Skeleton -->
          <template x-if="bookingsLoading">
            <div class="space-y-3">
              <template x-for="i in 3">
                <div
                  class="h-14 bg-zinc-900 border border-zinc-800 rounded-xl animate-pulse"
                ></div>
              </template>
            </div>
          </template>

          <!-- Empty -->
          <template x-if="!bookingsLoading && bookings.length === 0">
            <div
              class="flex items-center justify-center py-12 border border-zinc-800/60 rounded-xl"
            >
              <p class="text-zinc-600 text-sm">
                No rental history yet. Book a vehicle above to get started.
              </p>
            </div>
          </template>

          <!-- Table -->
          <template x-if="!bookingsLoading && bookings.length > 0">
            <div class="rounded-xl border border-zinc-800 overflow-hidden">
              <div class="table-scroll">
                <table class="w-full text-sm">
                  <thead>
                    <tr class="border-b border-zinc-800 bg-zinc-900/60">
                      <th
                        class="text-left px-4 py-3 text-xs font-medium text-zinc-500 uppercase tracking-wider whitespace-nowrap"
                      >
                        Code
                      </th>
                      <th
                        class="text-left px-4 py-3 text-xs font-medium text-zinc-500 uppercase tracking-wider whitespace-nowrap"
                      >
                        Vehicle
                      </th>
                      <th
                        class="text-left px-4 py-3 text-xs font-medium text-zinc-500 uppercase tracking-wider whitespace-nowrap"
                      >
                        Period
                      </th>
                      <th
                        class="text-left px-4 py-3 text-xs font-medium text-zinc-500 uppercase tracking-wider whitespace-nowrap"
                      >
                        Days
                      </th>
                      <th
                        class="text-left px-4 py-3 text-xs font-medium text-zinc-500 uppercase tracking-wider whitespace-nowrap"
                      >
                        Total
                      </th>
                      <th
                        class="text-left px-4 py-3 text-xs font-medium text-zinc-500 uppercase tracking-wider whitespace-nowrap"
                      >
                        Status
                      </th>
                      <th
                        class="text-right px-4 py-3 text-xs font-medium text-zinc-500 uppercase tracking-wider whitespace-nowrap"
                      >
                        Action
                      </th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-zinc-800/60">
                    <template x-for="b in bookings" :key="b.id">
                      <tr class="bg-zinc-900 hover:bg-zinc-800/40 transition">
                        <td
                          class="px-4 py-3.5 font-mono text-xs text-zinc-400 whitespace-nowrap"
                          x-text="b.booking_code ?? ('#' + b.id)"
                        ></td>
                        <td
                          class="px-4 py-3.5 font-medium text-zinc-200 whitespace-nowrap"
                          x-text="vehicleName(b.vehicle_id)"
                        ></td>
                        <td class="px-4 py-3.5 text-zinc-400 whitespace-nowrap">
                          <span x-text="b.start_date"></span>
                          <span class="text-zinc-600 mx-1">→</span>
                          <span x-text="b.end_date"></span>
                        </td>
                        <td
                          class="px-4 py-3.5 text-zinc-400 whitespace-nowrap"
                          x-text="(b.total_days ?? '—') + ' d'"
                        ></td>
                        <td
                          class="px-4 py-3.5 font-medium text-zinc-200 whitespace-nowrap"
                          x-text="price(b.total_price)"
                        ></td>
                        <td class="px-4 py-3.5 whitespace-nowrap">
                          <span
                            :class="bookingStatusClass(b.status)"
                            class="inline-flex items-center text-xs font-medium border rounded-full px-2.5 py-0.5 capitalize"
                            x-text="(b.status ?? 'booked').toLowerCase()"
                          ></span>
                        </td>
                        <td class="px-4 py-3.5 text-right whitespace-nowrap">
                          <template x-if="isActiveBooking(b.status)">
                            <button
                              @click="cancelBooking(b.id, b.vehicle_id)"
                              class="text-xs font-medium text-red-400 hover:text-red-300 border border-red-800/60 hover:border-red-700 bg-red-950/40 hover:bg-red-900/40 rounded-lg px-3 py-1.5 transition"
                            >
                              Cancel
                            </button>
                          </template>
                          <template x-if="!isActiveBooking(b.status)">
                            <span class="text-xs text-zinc-700">—</span>
                          </template>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </template>
        </div>
      </main>

      <!-- ── Footer ──────────────────────────────────────────────────────────── -->
      <footer class="border-t border-zinc-800/60 mt-auto">
        <div
          class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between"
        >
          <p class="text-xs text-zinc-600">
            &copy; Aldo Rifki Firmansyah - 3025.
          </p>
          <p class="text-xs text-zinc-700">Fleet Management System</p>
        </div>
      </footer>
    </div>
  </body>
</html>
